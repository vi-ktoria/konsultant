name: Deploy to Yandex Cloud

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install AWS CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y awscli

      - name: Sync to Yandex Cloud
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.YANDEX_CLOUD_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.YANDEX_CLOUD_SECRET_ACCESS_KEY }}
        run: |
          aws s3 sync ./static/ s3://${{ secrets.YANDEX_CLOUD_BUCKET_NAME }}/static/ \
            --endpoint-url https://storage.yandexcloud.net \
            --delete

          aws s3 sync ./map/ s3://${{ secrets.YANDEX_CLOUD_BUCKET_NAME }}/map/ \
            --endpoint-url https://storage.yandexcloud.net \
            --delete

          aws s3 cp ./index.html s3://${{ secrets.YANDEX_CLOUD_BUCKET_NAME }}/index.html \
            --endpoint-url https://storage.yandexcloud.net \
            --content-type "text/html"