name: Deploy to Yandex Cloud Object Storage

on:
  push:
    branches:
      - main  # Или ваша основная ветка, например, master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Этот шаг нужен, если вашему проекту требуется сборка, например, для React/Vue.
      # Если вы загружаете готовые HTML/JS файлы, этот блок можно пропустить.
      # - name: Install dependencies
      #   run: npm ci
      #
      # - name: Build project
      #   run: npm run build
      #
      # - name: Deploy to Yandex Cloud
      #   uses: sergeevpasha/yandex-cloud-s3-sync-github-actions@v0.1.0
      #   with:
      #     YANDEX_CLOUD_ACCESS_KEY_ID: ${{ secrets.YANDEX_CLOUD_ACCESS_KEY_ID }}
      #     YANDEX_CLOUD_SECRET_ACCESS_KEY: ${{ secrets.YANDEX_CLOUD_SECRET_ACCESS_KEY }}
      #     YANDEX_CLOUD_BUCKET_NAME: ${{ secrets.YANDEX_CLOUD_BUCKET_NAME }}
      #     PATH: "./dist"  # Путь к папке со сборкой
      #     CLEAR: true     # Очистить бакет перед загрузкой

      # Если сборка не нужна и вы загружаете папку со статикой напрямую:
      - name: Deploy static files to Yandex Cloud
        uses: sergeevpasha/yandex-cloud-s3-sync-github-actions@v0.1.0
        with:
          YANDEX_CLOUD_ACCESS_KEY_ID: ${{ secrets.YANDEX_CLOUD_ACCESS_KEY_ID }}
          YANDEX_CLOUD_SECRET_ACCESS_KEY: ${{ secrets.YANDEX_CLOUD_SECRET_ACCESS_KEY }}
          YANDEX_CLOUD_BUCKET_NAME: ${{ secrets.YANDEX_CLOUD_BUCKET_NAME }}
          PATH: "./"          # Путь к папке с вашими HTML/CSS/JS файлами
          CLEAR: true         # Опционально: очищает бакет перед загрузкой