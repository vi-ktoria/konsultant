<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>С чего начать покупку — Сервис анализа рисков</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/components/navbar.css">
    <link rel="stylesheet" href="../css/components/sidebar.css">
    <link rel="stylesheet" href="../css/articles.css">
    <link rel="stylesheet" href="../css/logo.css">
</head>
<body>
    <!-- Контейнер для навбара -->
    <header id="navbarContainer"></header>

    <main class="article-page">
        <section class="article-layout">
            <div class="article-left">

                <section class="article-hero">
                    <h1 id="articleTitle">Загрузка статьи...</h1>
                    <p id="articleDescription"></p>
                </section>

                <section class="article-contents" id="articleContentsBlock" style="display: none;">
                    <h2>Читайте в статье</h2>
                    <div class="article-contents-list" id="articleContents"></div>
                </section>

                <section class="article-section" id="articleContent">
                    <p>Загрузка...</p>
                </section>

            </div>

            <!-- Контейнер для правого блока -->
            <div id="sidebarContainer" class="right-column"></div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/config.js"></script>
    <script src="../js/supabase-client.js"></script>
    <script src="../js/content-api.js"></script>
    <script src="../js/search.js"></script>
    <script src="../js/regions.js"></script>
    <script src="../js/components/navbar.js"></script>
    <script src="../js/components/sidebar.js"></script>
</body>
</html>
