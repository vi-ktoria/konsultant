<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Оценка рисков покупки недвижимости</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="start-page">
    <h2>Оценка рисков покупки недвижимости</h2>
    <p>Введите адрес объекта, чтобы посмотреть проблемные объекты поблизости.</p>

    <form id="address-form">
        <input
            type="text"
            id="address-input"
            placeholder="Например: Москва, ул. Тверская, 1"
            required
            autofocus>
        <button type="submit">Проверить</button>
    </form>

    <div id="start-error" class="warning" style="display:none;"></div>
</div>

<script>
    const form = document.getElementById("address-form");
    const input = document.getElementById("address-input");
    const errorBox = document.getElementById("start-error");

    form.addEventListener("submit", (e) => {
        e.preventDefault();

        const address = input.value.trim();
        if (!address) return;

        errorBox.style.display = "none";
        window.location.href = "map.html?address=" + encodeURIComponent(address);
    });
</script>

</body>
</html>
