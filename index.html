<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Сервис анализа рисков</title>
    <link rel="stylesheet" href="static/css/style.css" />
</head>
<body>
    <nav class="navbar">
        <div class="logo">Риск-Анализ</div>
    </nav>
    <main>
        <div class="content">
            <h1>Проверьте квартиру перед покупкой</h1>

            <div class="search-wrapper">
                <input type="text" class="search-input" placeholder="Город, улица, дом, квартира" />
                <button class="search-btn">Проверить</button>
            </div>
        </div>
    </main>
    <script src="static/js/main.js"></script>
</body>
</html>
